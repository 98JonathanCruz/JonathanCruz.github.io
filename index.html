<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Multimedia</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Profile card-->
<div class="card">
<!-- Cover Banner-->
<div class="cover"></div>
<!-- Avatar-->
<div class="avatar">
<span class="avatar-emoji"><img src="images/prof3.jpg" alt="pf"></span>
</div>

<!-- User Information-->
<div class="info">
<h1 class="name">Jonathan Cruz</h1>
<p class="title">Student / IT technician</p>
<p class="bio">Always has a pack of gum</p>
<button class="follow-btn">Follow</button>
</div>

<!--Stats Row-->
<div class="stats">
<div class="stat">
<span class="stat-number">1</span>
<span class="stat-label">Post</span>
</div>
<div class="stat">
<span class="stat-number">9.5K</span>
<span class="stat-label">Followers</span>
</div>
<div class="stat">
<span class="stat-number">1</span>
<span class="stat-label">Following</span>
</div>
</div>
<!-- Social Links-->
<div class="socials">
<a href="https://www.instagram.com/the_complicated_username/" class="social-btn" title="Instagram"><img src="images/insta.png" alt="instagram" width="35px"></a>
<a href="https://www.linkedin.com/in/jonathan-cruz-39399b300/" class="social-btn" title="LinkedIn"><img src="images/linkedin.png" alt="LinkIn Img" width="35px"></a>
<a href="98jonathancruz@gmail.com" class="social-btn" title="Email"><img src="images/gmail.png" alt="envelope" width="35px"></a>
</div>
</div>
</body>
</html>
